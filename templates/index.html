<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SysDash</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #64748b; margin-bottom: 40px; font-size: 0.9rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 900px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }
        .card-label {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }
        .card-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            font-variant-numeric: tabular-nums;
        }
        .card-detail { font-size: 0.85rem; color: #64748b; margin-top: 8px; }
        .bar {
            width: 100%;
            height: 8px;
            background: #0f172a;
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease, background 0.6s ease;
        }
        .cpu .bar-fill    { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
        .ram .bar-fill    { background: linear-gradient(90deg, #a78bfa, #8b5cf6); }
        .temp .bar-fill   { background: linear-gradient(90deg, #34d399, #10b981); }
        .alert .bar-fill  { background: linear-gradient(90deg, #f87171, #ef4444) !important; }
        .alert .card-value { color: #f87171; }
        .controls { margin: 32px 0 8px; display: flex; align-items: center; gap: 16px; }
        button {
            background: linear-gradient(135deg, #60a5fa, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            box-shadow: 0 4px 16px rgba(96, 165, 250, 0.25);
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(96, 165, 250, 0.35); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: wait; }
        .timestamp { color: #64748b; font-size: 0.85rem; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <h1>SysDash</h1>
    <p class="subtitle">Surveillance système · mise à jour manuelle</p>

    <div class="controls">
        <button id="refresh-btn" onclick="refresh()">Actualiser</button>
        <span class="timestamp" id="last-update">Aucune mesure</span>
    </div>

    <div class="grid">
        <div class="card cpu" id="cpu-card">
            <div class="card-label">Processeur</div>
            <div class="card-value"><span id="cpu-val">--</span><span style="font-size:1.2rem;color:#64748b">%</span></div>
            <div class="bar"><div class="bar-fill" id="cpu-bar" style="width:0%"></div></div>
            <div class="card-detail">Seuil d'alerte : 80 %</div>
        </div>

        <div class="card ram">
            <div class="card-label">Mémoire vive</div>
            <div class="card-value"><span id="ram-val">--</span><span style="font-size:1.2rem;color:#64748b">%</span></div>
            <div class="bar"><div class="bar-fill" id="ram-bar" style="width:0%"></div></div>
            <div class="card-detail" id="ram-detail">-- Go / -- Go</div>
        </div>

        <div class="card temp">
            <div class="card-label">Température CPU</div>
            <div class="card-value" id="temp-val">--</div>
            <div class="bar"><div class="bar-fill" id="temp-bar" style="width:0%"></div></div>
            <div class="card-detail">Plage normale : 30–70 °C</div>
        </div>
    </div>

    <script>
        async function refresh() {
            const btn = document.getElementById("refresh-btn");
            btn.disabled = true;
            btn.textContent = "Chargement...";
            try {
                const res = await fetch("/api/stats");
                const data = await res.json();

                document.getElementById("cpu-val").textContent = data.cpu_percent.toFixed(1);
                document.getElementById("cpu-bar").style.width = data.cpu_percent + "%";
                document.getElementById("cpu-card").classList.toggle("alert", data.cpu_percent > 80);

                document.getElementById("ram-val").textContent = data.ram_percent.toFixed(1);
                document.getElementById("ram-bar").style.width = data.ram_percent + "%";
                document.getElementById("ram-detail").textContent =
                    `${data.ram_used_gb} Go / ${data.ram_total_gb} Go`;

                document.getElementById("temp-val").textContent = data.cpu_temp;
                const tempNum = parseFloat(data.cpu_temp);
                if (!isNaN(tempNum)) {
                    const pct = Math.min(100, (tempNum / 100) * 100);
                    document.getElementById("temp-bar").style.width = pct + "%";
                }

                const now = new Date();
                document.getElementById("last-update").textContent =
                    "Dernière mesure : " + now.toLocaleTimeString("fr-FR");
            } catch (e) {
                console.error(e);
                document.getElementById("last-update").textContent = "Erreur lors de la mesure";
            } finally {
                btn.disabled = false;
                btn.textContent = "Actualiser";
            }
        }
    </script>
</body>
</html>
